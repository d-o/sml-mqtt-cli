#
# CI: build and run the sml-mqtt-cli unit test suite via west twister.
#
# Uses the official Zephyr CI container image which has the Zephyr SDK and
# all build tools pre-installed.  Only the Zephyr source itself and the
# Boost.SML module are fetched at run-time; these are cached keyed on the
# test manifest so a cold run is a one-time cost.
#
# The tests use an in-process fake MQTT broker and run entirely inside
# qemu_riscv32 (CONFIG_NET_TEST + CONFIG_NET_LOOPBACK).  No external
# broker, no host network access, no Docker-in-Docker.
#
# Workspace layout after checkout + init:
#
#   $GITHUB_WORKSPACE/
#   |-- .west/              (west config, points to zephyr as manifest)
#   |-- zephyr/             (Zephyr RTOS source, fetched by west update)
#   |-- boost-sml/          (Boost.SML Zephyr module, shallow clone)
#   `-- sml-mqtt-cli/       (this repository, actions/checkout)

name: Tests

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Opt into Node.js 24 for all actions now to silence the Node.js 20 deprecation
# warning that appears on runners using actions/checkout@v4, actions/cache@v4,
# and actions/upload-artifact@v4.  These actions all support Node.js 24 and
# will be forced onto it on June 2, 2026 regardless; opting in early avoids
# spurious warnings in the CI log.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Cancel any in-progress run for the same branch/PR when a new commit
# is pushed.  This prevents stale runs from occupying a runner slot and
# avoids misleading pass/fail status on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twister:
    name: "Twister (qemu_riscv32)"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.28.6
      options: '--entrypoint /bin/bash'

    steps:
      # The runner UID may not match the container UID.  This is a known
      # GitHub Actions limitation with container jobs.
      - name: Apply workspace ownership workaround
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Check out into sml-mqtt-cli/ so the workspace layout matches the
      # local T2 development setup.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: sml-mqtt-cli

      # Cache the west workspace (Zephyr source + Boost.SML).
      # Key is tied to tests/west.yml so a manifest change (new Zephyr
      # revision, new Boost.SML revision) automatically invalidates it.
      - name: Cache west workspace
        id: west-cache
        uses: actions/cache@v4
        with:
          path: |
            .west
            zephyr
            boost-sml
          key: west-v4.3-${{ hashFiles('sml-mqtt-cli/tests/west.yml') }}

      # Populate the cache on a miss.
      # west init -m zephyr sets up the workspace pointing at Zephyr's
      # own manifest.  west update zephyr fetches only the Zephyr repo
      # (not all of Zephyr's hundreds of HAL modules).
      # boost-sml is a small header-only repo fetched separately.
      - name: Initialise west workspace
        if: steps.west-cache.outputs.cache-hit != 'true'
        run: |
          west init -m https://github.com/zephyrproject-rtos/zephyr \
            --mr v4.3-branch .
          west update zephyr
          git clone --depth 1 --branch zephyr_module \
            https://github.com/d-o/sml.git boost-sml

      # The CI container sets ZSDK_VERSION but not ZEPHYR_SDK_INSTALL_DIR.
      # CMake's FindZephyr-sdk.cmake searches CMAKE_PREFIX_PATH / the
      # ZEPHYR_SDK_INSTALL_DIR env var, so we must export it before calling
      # west twister.  The SDK lives at /opt/toolchains/zephyr-sdk-<ver>.
      - name: Export Zephyr SDK path
        run: |
          echo "ZEPHYR_SDK_INSTALL_DIR=/opt/toolchains/zephyr-sdk-${ZSDK_VERSION}" \
            >> "$GITHUB_ENV"

      # Run Twister.
      # -T points at our test suite root (Twister finds testcase.yaml there).
      # --inline-logs prints build/run output directly in the CI log.
      # -x (--extra-args) injects CMake cache entries, auto-prefixed with -D.
      # ZEPHYR_MODULES tells CMake where to find the boost-sml and sml-mqtt-cli
      # modules so Kconfig discovers LIB_BOOST_SML and LIB_SML_MQTT_CLI.
      # Note: --cmake-args is NOT a valid twister flag; the correct flag is -x.
      - name: Run Twister
        run: |
          west twister \
            -T sml-mqtt-cli/tests \
            -p qemu_riscv32 \
            --test libraries.sml_mqtt_cli.unit \
            --inline-logs \
            -x "ZEPHYR_MODULES=${GITHUB_WORKSPACE}/boost-sml;${GITHUB_WORKSPACE}/sml-mqtt-cli"

      # Always upload the full Twister output directory so failures can be
      # diagnosed from the build log and test XML even when --inline-logs
      # output has been truncated by GitHub's log size limit.
      - name: Upload Twister artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-${{ github.run_number }}
          path: twister-out/
          retention-days: 30

  twister-tls:
    name: "Twister TLS (qemu_riscv32)"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.28.6
      options: '--entrypoint /bin/bash'

    steps:
      - name: Apply workspace ownership workaround
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: sml-mqtt-cli

      - name: Cache west workspace
        id: west-cache-tls
        uses: actions/cache@v4
        with:
          path: |
            .west
            zephyr
            boost-sml
            modules/crypto/mbedtls
          key: west-tls-v4.3-${{ hashFiles('sml-mqtt-cli/tests/west.yml') }}

      - name: Initialise west workspace
        if: steps.west-cache-tls.outputs.cache-hit != 'true'
        run: |
          west init -m https://github.com/zephyrproject-rtos/zephyr \
            --mr v4.3-branch .
          west update zephyr mbedtls
          git clone --depth 1 --branch zephyr_module \
            https://github.com/d-o/sml.git boost-sml

      - name: Export Zephyr SDK path
        run: |
          echo "ZEPHYR_SDK_INSTALL_DIR=/opt/toolchains/zephyr-sdk-${ZSDK_VERSION}" \
            >> "$GITHUB_ENV"

      # The TLS scenario uses extra_configs in testcase.yaml to enable
      # MQTT_LIB_TLS and the mbedTLS stack.  mbedtls must be in
      # ZEPHYR_MODULES so its Kconfig is loaded.
      - name: Run Twister (TLS)
        run: |
          west twister \
            -T sml-mqtt-cli/tests \
            -p qemu_riscv32 \
            --test libraries.sml_mqtt_cli.tls \
            --inline-logs \
            -x "ZEPHYR_MODULES=${GITHUB_WORKSPACE}/boost-sml;${GITHUB_WORKSPACE}/sml-mqtt-cli;${GITHUB_WORKSPACE}/modules/crypto/mbedtls"

      - name: Upload Twister artifacts (TLS)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-tls-${{ github.run_number }}
          path: twister-out/
          retention-days: 30
