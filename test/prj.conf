# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Boost.SML
CONFIG_LIB_BOOST_SML=y

# SML MQTT CLI
CONFIG_LIB_SML_MQTT_CLI=y

# Testing framework
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192

# Networking for testing (loopback, no real network needed)
CONFIG_NETWORKING=y
CONFIG_NET_TEST=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_LOOPBACK=y

CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y

# MQTT
CONFIG_MQTT_LIB=y

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y

# System
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Random for testing
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
