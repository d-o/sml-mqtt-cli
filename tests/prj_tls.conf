# TLS overlay — layer on top of prj.conf to enable the TLS stack.
# Usage (build only, no handshake):
#   west build -p always -s sml-mqtt-cli/tests -b qemu_riscv32 \
#     -- -DZEPHYR_MODULES="$PWD/boost-sml;$PWD/sml-mqtt-cli" \
#        -DCONF_FILE="prj.conf;prj_tls.conf"

# MQTT TLS transport
CONFIG_MQTT_LIB_TLS=y

# TLS socket layer — NET_SOCKETS_SOCKOPT_TLS automatically selects MBEDTLS
# (via NET_NATIVE) and implies MBEDTLS_SSL_PROTO_TLS1_2, MBEDTLS_RSA_C,
# MBEDTLS_KEY_EXCHANGE_RSA_ENABLED, etc.  No need to set them explicitly.
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y

# mbedTLS needs roughly 30-60 KB of heap for a TLS handshake.
# Increase from the prj.conf default of 16384.
CONFIG_HEAP_MEM_POOL_SIZE=65536

# NET_SLIP_TAP defaults to y on any QEMU_TARGET unless NET_TEST is set.
# Without this, SLIP -> UART_PIPE gets pulled in and the build fails
# because qemu_riscv32 has no zephyr,uart-pipe DTS chosen node.
# boards/qemu_riscv32.conf sets this, but is not merged when CONF_FILE
# is overridden explicitly via -DCONF_FILE="prj.conf;prj_tls.conf".
CONFIG_NET_TEST=y
CONFIG_NET_LOOPBACK=y
