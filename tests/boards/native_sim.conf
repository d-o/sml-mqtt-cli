#
# native_sim board config for sml-mqtt-cli INTEGRATION tests.
#
# Builds the sml_mqtt_integration suite which connects to a real Mosquitto
# broker running on the build host via a TAP virtual Ethernet interface.
# None of the fake-broker loopback tests are compiled in this configuration.
#
# IP assignment:
#   Zephyr app (this binary)  -> 192.0.2.2/24
#   Host TAP interface        -> 192.0.2.1/24  (set by setup_tap.sh)
#   Mosquitto listens on      -> 192.0.2.1:1883
#
# Prerequisites (run once before the binary):
#   tests/scripts/run_integration_tests.sh
#
# Or manually:
#   sudo ip tuntap add zeth0 mode tap user $USER
#   sudo ip addr add 192.0.2.1/24 dev zeth0
#   sudo ip link set zeth0 up
#   mosquitto -c tests/scripts/mosquitto_integration.conf &
#   ./build/zephyr/zephyr.exe

# TAP virtual Ethernet driver (native_sim only)
CONFIG_ETH_NATIVE_TAP=y

# Slow execution to real time so network timers fire correctly
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y

# Static IPv4 configuration applied automatically by net_config on boot
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.1"

# Allow up to 10 s for the TAP interface to come up
CONFIG_NET_CONFIG_INIT_TIMEOUT=10
