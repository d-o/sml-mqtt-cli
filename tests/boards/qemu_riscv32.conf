#
# qemu_riscv32 board config for the sml-mqtt-cli test suite.
#
# Enables Zephyr's in-kernel loopback networking so the fake broker and
# all 20 unit tests can run inside QEMU with no external broker.
#
# CONFIG_NET_TEST enables in-kernel loopback test mode.
# CONFIG_NET_LOOPBACK must be set explicitly - NET_TEST does not select it.

CONFIG_NET_TEST=y
CONFIG_NET_LOOPBACK=y
