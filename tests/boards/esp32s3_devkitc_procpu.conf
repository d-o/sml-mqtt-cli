#
# ESP32-S3 stack size overrides for the sml-mqtt-cli test suite.
#
# Xtensa LX7 (ESP32-S3) has a larger per-frame ABI cost than the
# RISC-V target used in CI (qemu_riscv32).  The Zephyr networking
# threads that the test suite exercises (TCP work queue, RX queue,
# net_mgmt event thread) overflow with their default 1-2 KB stacks
# because the gcov / networking code paths are deeper on Xtensa.
#
# These values match the minimums found by trial and observation;
# the Zephyr net tests for ESP32 use similar sizes.

# TCP work queue thread (1024 default, overflows on Xtensa with
# active TCP sockets and C++ exception unwind tables present)
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096

# Enable the built-in USB-JTAG CDC-ACM serial driver so that the DTS
# overlay can redirect zephyr,console to &usb_serial (ttyACM0).
# Without this the uart_console driver fails to compile because the
# __device_dts_ord for usb_serial is never declared.
CONFIG_SERIAL_ESP32_USB=y
