# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Boost.SML
CONFIG_LIB_BOOST_SML=y

# SML MQTT CLI
CONFIG_LIB_SML_MQTT_CLI=y

# Testing framework
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192

# Networking (common to all targets)
# CONFIG_NET_TEST and CONFIG_NET_LOOPBACK are board-specific:
#   qemu_riscv32 / esp32s3: boards/<board>.conf enables both NET_TEST and
#   NET_LOOPBACK for the in-process fake broker (NET_TEST does not auto-select
#   NET_LOOPBACK).
#   native_sim: boards/native_sim.conf enables ETH_NATIVE_TAP instead.
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y

CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_SOCKETS=y

# MQTT
CONFIG_MQTT_LIB=y

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y

# System
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384
# Each test needs 3 fds (server sock + accepted sock + client TCP); default=7 is too small.
CONFIG_ZVFS_OPEN_MAX=16

# Random for testing
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
