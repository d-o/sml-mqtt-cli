# Mosquitto configuration for sml-mqtt-cli TLS integration tests.
#
# This config is intentionally permissive - it is for local integration
# testing only and must NOT be used in production or exposed to a network.
#
# Requires test certificates generated by tests/scripts/gen_test_certs.sh.
# The native_sim binary (Zephyr app with TAP Ethernet at 192.0.2.2) connects
# to the host's TAP interface at 192.0.2.1 on port 8883.
#
# Usage:
#   # 1. Generate test certs (one-time):
#   #    tests/scripts/gen_test_certs.sh
#   # 2. Start broker:
#   #    mosquitto -c tests/scripts/mosquitto_tls.conf
#   # 3. Run the native_sim TLS integration test

# Listen on port 8883 (MQTT over TLS)
listener 8883 0.0.0.0

# TLS configuration — paths are relative to where mosquitto is invoked.
# Run mosquitto from the workspace root: mosquitto -c tests/scripts/mosquitto_tls.conf
cafile tests/scripts/certs/ca.crt
certfile tests/scripts/certs/broker.crt
keyfile tests/scripts/certs/broker.key

# Require the client to present a certificate signed by the test CA.
# This enables mutual TLS (mTLS): both broker and client are authenticated.
require_certificate true

# Allow connections without username/password (cert is the authenticator)
allow_anonymous true

# Do not persist session state or messages between restarts
persistence false

# Log connections and subscriptions for debugging
log_type all
