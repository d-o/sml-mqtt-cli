#
# Minimal Mosquitto configuration for sml-mqtt-cli integration tests.
#
# This config is intentionally permissive - it is for local integration
# testing only and must NOT be used in production or exposed to a network.
#
# Mosquitto listens on all interfaces at port 1883 so the native_sim binary
# (Zephyr app with TAP Ethernet at 192.0.2.2) can reach it via the host's
# TAP interface at 192.0.2.1.
#
# Usage:
#   mosquitto -c tests/scripts/mosquitto_integration.conf
# Or via the convenience script:
#   tests/scripts/run_integration_tests.sh

# Listen on all interfaces, port 1883 (plaintext, no TLS)
listener 1883 0.0.0.0

# Allow connections without username/password
allow_anonymous true

# Do not persist session state or messages between restarts
persistence false

# Log connections and subscriptions for debugging
log_type all
